name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: universetechgeek-app
  AZURE_WEBAPP_PACKAGE_PATH: '.'
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build
        run: dotnet build --configuration Release --no-restore
      
      - name: Publish
        run: dotnet publish --configuration Release --output ./publish
      
      - name: Build Docker image
        run: |
          docker build -t universetechgeek-app:${{ github.sha }} .
          docker tag universetechgeek-app:${{ github.sha }} universetechgeek-app:latest
      
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: universetechgeek-app:latest
      
      - name: Configure app settings
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az webapp config appsettings set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group UniverseTechGeek-RG \
              --settings \
                ApiKeys__RAWG="${{ secrets.RAWG_API_KEY }}" \
                ApiKeys__TMDb="${{ secrets.TMDB_API_KEY }}" \
                ApiKeys__LastFm="${{ secrets.LASTFM_API_KEY }}" \
                ASPNETCORE_URLS="http://+:80"
